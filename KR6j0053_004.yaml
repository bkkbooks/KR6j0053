body:
  text: 爾時世尊大毗盧遮那金剛如來復入一切如來身語心業金剛淨光明雲堅固三摩地從定出已以金剛三業説此金剛忿怒焰鬘得迦大明王大明曰那莫三滿多迦引野嚩引訖唧二合多嚩日囉二合引赧一句唵引二朅朅三佉引呬佉呬四薩哩嚩二合耨瑟吒二合薩埵那摩迦五阿悉目娑羅鉢囉戍播設賀薩多二合引六拶覩哩部二合惹仁左切七拶覩哩目二合佉八殺吒拶二合囉拏九阿引誐蹉阿引誐蹉十薩哩嚩二合耨瑟吒二合鉢囉二合引拏引鉢賀引哩尼十一摩賀引尾伽那二合伽引多迦尾訖哩二合多引那那十二薩哩嚩二合部多婆焬迦囉十三阿吒吒訶引娑那引儞禰十四咩引伽囉二合拶哩摩二合儞嚩薩那十五酤嚕酤嚕薩哩嚩二合葛哩𤚥二合十六親那親那薩哩嚩二合滿怛囕二合十七頻那頻那鉢囉母捺囕二合引十八阿引迦哩沙二合野阿引迦哩沙二合野十九薩哩嚩二合部引旦引儞哩摩二合他儞哩摩二合他二十薩哩嚩二合耨瑟啖二合引鉢囉二合尾舍野鉢囉二合尾舍野二十一曼拏羅摩提吠嚩莎旦𡁠尾旦引怛迦囉二十二酤嚕酤嚕二十三摩摩迦引哩煬二合二十四捺賀捺賀二十五鉢左鉢左二十六摩引尾藍末摩引尾藍末二十七三摩野摩耨三摩二合囉二十八吽引吽引二十九發吒半音發吒上同三十薩普二合吒野薩普二合吒野三十一薩哩嚩二合引舍引鉢哩布囉迦三十二呬呬婆誐鑁三十三緊唧囉引野悉摩摩薩哩嚩二合引囉湯二合娑引馱野莎引賀引三十四説此大明時所有諸佛如來皆悉稱讚一切衆會皆悉驚怖咸各思念心金剛如來而此大明有大威力諸有作是法者當取葛波羅圓具無損者若時若處依法安置以此大明加持三遍即能成就一切事業乃至佛眼菩薩摩摩枳菩薩等於剎那間亦能句召此名諸佛心金剛爾時世尊大毗盧遮那金剛如來復入最上三昧光明三摩地從定出已以金剛三業説此甘露軍拏利大忿怒明王大明曰那莫三滿多迦引野嚩引訖唧二合多嚩日囉二合引赧一句那謨嚩日囉二合骨嚕二合馱引野二摩賀引能瑟吒嚕三合怛迦二合吒陪囉嚩引野三阿悉目娑羅鉢囉戍播舍舍賀薩多二合引野四唵引五阿蜜哩二合多軍拏梨六朅朅七佉引呬佉引呬八底瑟吒二合底瑟吒二合九滿馱滿馱十賀那賀那十一捺賀捺賀十二鉢左鉢左十三誐哩惹二合誐哩惹二合十四怛哩惹二合怛哩惹二合十五尾薩普二合吒野尾薩普二合吒野十六薩哩嚩二合誐囉二合賀尾伽那二合尾那引野岡十七摩賀引誐拏鉢底𡁠引尾旦多迦囉引野十八吽引發吒半音莎引賀引十九説此大明時諸佛如來皆悉稱讚一切衆會生大驚怖咸各思念身金剛如來而此大明與彼一切大明相應悉能成就一切事業若依儀軌作是法者即得諸佛大勇健軍常所衛護爾時世尊寶生金剛如來即入諸佛光明金剛三摩地從定出已以金剛三業説此無能勝大忿怒明王大明曰那莫三滿多迦引野嚩引訖唧二合多嚩日囉二合引赧一句唵引二吽引三𡁠那哩致吒四吽引吽引發吒半音發吒上同莎引賀引五説此大明時諸佛如來皆悉稱讚一切衆會生大驚怖咸各發起大菩提心想彼所有大惡忿怒囉剎娑等迷悶驚怖此大明力悉能調伏又此大明從彼金剛心所出生悉能成就種種事業爾時世尊無量壽金剛如來即入無量壽出生三摩地從定出已以金剛三業説此蓮華出生金剛忿怒馬頭大明王大明曰那莫三滿多迦引野嚩引訖唧二合多嚩日囉二合引赧一句唵引二吽引吽引吽引三多引嚕羅四尾引嚕羅五薩哩嚩二合尾沙伽引多伽六入嚩二合隸多七尾薩普二合凌誐八阿吒吒訶娑計舍哩引九薩吒引跓鉢啖迦引囉十嚩日囉二合苦囉儞哩伽二合引多十一左隸多十二嚩蘇馱引多羅十三儞説引薩摩引嚕覩怛叱二合鉢多二合十四馱囉尼馱囉毗沙拏十五阿吒吒賀引娑十六阿鉢哩弭多嚩羅鉢囉引訖囉二合摩十七阿哩耶二合毗多十八部多誐拏引馱喻二合始多十九沒𬽓切身沒𠆙上同二十喝野屹哩二合嚩二十一佉引捺佉引捺二十二鉢囉滿怛囕二合引親那親那二十三悉提孕二合弭儞舍二十四阿引尾舍野二十五薩哩嚩二合入嚩二合囉必舍引左引那引二十六薩哩嚩二合誐囉二合呬沙嚩二合鉢囉二合底賀覩婆嚩二十七嚩日囉二合能瑟吒囉三合緊唧囉引野悉二十八伊𤚥薩哩嚩二合耨瑟吒二合誐囉二合㰠耨瑟吒二合薩哩半二合嚩引二十九度那度那三十摩他摩他三十一摩吒摩吒三十二鉢吒鉢吒三十三播吒野播吒野三十四滿馱滿馱三十五那吒那吒三十六沒馱達哩摩二合僧伽引耨倪也二合旦羯哩忙二合酤嚕尸引伽囕二合三十七喝野屹哩二合引嚩引野發吒半音三十八嚩日囉二合引野發吒上同三十九嚩日囉二合誐引怛囉二合引野發吒上同四十嚩日囉二合儞怛囉二合引野發吒上同四十一嚩日囉二合能瑟吒囉三合引野發吒上同四十二嚩日囉二合苦囉引野發吒上同四十三嚩日囉二合苦囉儞哩伽二合多那引野發吒上同四十四鉢囉滿怛囉二合尾那引舍那引野發吒上同四十五怛賴二合路枳也二合婆煬迦囉引野發吒上同四十六薩哩嚩二合羯哩弭二合引沙嚩二合鉢囉二合底賀多引野發吒上同四十七嚩日囉二合酤羅怛囉二合引薩那引野發吒上同四十八吽引吽引吽引四十九發吒上同發吒上同發吒上同莎引賀引十五説此大明時諸佛如來皆悉稱讚一切衆會生大驚怖咸各思念金剛智主即時於等虛空遍滿一切境界中出現金剛訶邏喝羅廣大光明於其一切非境界中出現一切大惡忿怒王爾時世尊不空成就金剛如來即入三昧出生幢金剛三摩地從定出已以金剛三