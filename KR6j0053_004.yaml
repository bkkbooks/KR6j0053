住甘露法相應依本部儀軌誦本部大明數滿五十遍決定能句召金剛鉤大像平等熾盛光金剛曼拏羅滿空乾𭔞衆現忿怒金剛安住金剛地執金剛器仗謂三叉及鉤阿修羅乾𭔞彼亦能句召當用皚哩迦或復朅致迦當於月出時誦大明加持句召法相應所有梵釋天用皚哩迦等當書彼名字即時能句召隨所求所作語金剛所説一切皆如意想焰鬘得迦大忿怒明王圓具一切相安住大輪中身赤如劫火觀想金剛鉤作大惡忿怒句召藥叱尼此名三昧印一切大明句一切句召法如所説成就金剛手菩薩須臾能善説如是一切明究竟最上王爾時世尊即入普遍三摩地從定出已以金剛三業説此嚩日囉播多羅大忿怒明王大明曰唵引一句戍梨儞引莎引賀引二説此大明時所有一切大威力者那誐乾𭔞衆驚怖迷悶咸各思念諸佛菩薩而此大明速能圓滿諸成就法彼乾𭔞衆作句召已現殊妙相即時皆至作諸成就是時世尊復入虛空出生三昧金剛三摩地從定出已以金剛三業説此大法三昧金剛顰眉菩薩大明曰唵引一句婆野那引舍儞二怛囉二合引西引怛囉二合引薩野三勃哩二合酤致怛致四吠多致五吠囉致六碎帝莎多七惹致引儞引莎引賀引八説此大明時所有一切持明天及天后皆大驚怖咸各思念大智金剛而此大明有大威力從寂滅金剛最上出生住三金剛智於一切處普能句召所有持明天后以此大明亦能句召而彼天后大力色相妙好嚴飾於剎那間句召即至作諸事業皆得成就又此大明若以忿怒持誦一洛叉數一切事業速得成就復次宣説一切忿怒王調伏怨惡作諸吉祥事大明持誦行當所調伏者即彼一切極惡衆生所謂謗阿闍梨及謗大乘作諸魔事隨順邪明壞佛種性不能勤求佛菩提道又於十方一切衆生身語心業起破壞想生怨惡心如是等輩即以此法而可調伏若作調伏法者當於一處想忿怒像依法儀軌時處相應於忿怒像前誦彼大明一百八遍一切惡者決定句召悉令調伏又復若作調伏法者先當擇其處所或於彼舍或於空室乃至四衢道獨樹下等當取摩耨沙阿悉底長八指量而用作橛以大明加持一百八遍當用置於所調伏者阿哩挼哩彼於半月中即當調伏又法當用葛波羅圓滿具足者當書大明置於其內默持往彼阿哩挼哩或復以多羅樹葉及餘竹帛等書忿怒大明亦如前法置阿哩挼哩彼即調伏此名諸佛金剛因大三昧法是時世尊復入一切如來身語心金剛縛三摩地從定出已以金剛三業宣説三界身語心金剛橛大明曰唵引一句伽伽伽引多野伽引多野二薩哩嚩二合耨瑟啖二合發吒半音發吒上同三計羅野計羅野四薩哩嚩二合播謗發吒上同發吒上同五吽引吽引吽引六嚩日囉二合引計羅七嚩日囉二合引馱嚕引八倪也二合引鉢野底九迦引野嚩引訖唧二合多十嚩日囉二合引計羅野吽引發吒上同十一説此大明時所有一切大威德金剛驚怖迷悶咸各思念虛空金剛而此大明即金剛橛若欲作是金剛橛者或用佉禰囉木或復鐵等依其分量如法而作作已依法加持而能調伏破壞一切此即金剛薩埵部中熾盛廣大平等光明三金剛身所出生法若與毗盧遮那金剛如來大印相應是即囉誐金剛若住焰鬘得迦忿怒明王大印相應即名三金剛橛若與甘露軍拏利忿怒明王相應是即大惡忿怒出生金剛相應諸佛大主宰諸修法者當從心至足想此金剛橛却復從頂如前觀想即得尾日林毗多而能安住禪定金剛即得諸佛決定相應爾時世尊大毗盧遮那金剛如來即入身金剛尾日林毗多三摩地從定出已説身三昧安金剛橛大明曰唵引一句親捺親捺二賀那賀那三捺賀捺賀四儞引鉢多二合嚩日囉二合引左訖囉二合吽引發吒半音五安金剛橛當誦此明下彼橛時依法儀軌作毗盧遮那佛步勢以左手大指執金剛橛用右手釘入土分寸如彼儀軌此即金剛薩埵三金剛身出生正法安住三昧爾時世尊無量壽金剛如來即入語金剛尾日林毗多三摩地從定出已以金剛三業宣説語三昧金剛橛大明曰唵引一句紇哩二合引二唵引三普哩普二合嚩四此即蓮華部法亦如前説釘金剛橛誦此大明亦用左手大指執金剛橛作無量壽佛步勢然想智金剛蓮華出生正法安住三昧爾時世尊阿閦金剛如來即入心金剛尾日林毗多三摩地從定出已以金剛三業宣説心三昧大明曰唵引一句嚩日囉二合引囉引惹吽引二此即金剛部法如前儀軌釘金剛橛然觀想五鈷金剛熾盛光明作阿閦如來步勢當下橛時誦此大明從三金剛無垢出生正法安住三昧如是等身語心三昧金剛橛大明儀軌等虛空界金剛出生諸有作者依法而作即能成就一切調伏爾時世尊大毗盧遮那金剛如來盡有情界而為所依得大歡喜出大音聲作如是言大哉祕密最勝句大哉所説真實義大哉寂靜妙法門大哉金剛廣大行諸佛所説金剛橛諸大菩薩所敬愛身語心業大金剛亦攝祕密金剛橛所有一切大明句真實金剛橛出生最上金剛身語心是即大明真實義一切如來金剛三業最上甚深祕密中祕密諸佛大集會一切心真實金剛出生三昧分第十五爾時金剛手菩薩摩訶薩即於虛空中出現大文字一切智出生一切灌頂義復從語金剛宣説如是法修法者當想四方曼拏羅中現忿怒王甘露軍拏利然於中觀想乾𭔞而作法彼色相殊妙諸分皆圓滿若修此法者住真實三昧於一切無礙得最上成就彼五曼拏羅想五佛影像獻最上供養祕密大明行毗盧尊影像金剛身語心禪定行相應諸佛平等光青優鉢羅華囉惹迦大色想乾𭔞亦然金剛手相應若依此儀軌能作相應事此諸大明中難行相應行於一剎那間金剛手平等一切法自在欲解脫隨轉修瑜伽行者欲求成就法於一切時中作金剛法想金剛法無我即安住十地善持語三昧一切勝自在所有諸種族所謂婆羅門剎帝利吠舍及彼首陀等乃至旃陀羅所生諸乾𭔞隨取而作法當勿生分別此祕密平等成就金剛法日入時作法日出時成就依本法儀軌如理而所作得金剛薩埵施最上成就三身大誓願諸佛一切相放百由旬光遍照於一切二處若相應衆相應平等此諸成就中難行三昧行彼五種甘露金剛成就食亦諸成就中難行三昧行若甘露平等二處亦相應出現佛菩提成最上真實此名諸佛欲解脫三昧法爾時世尊大毗盧遮那金剛如來即入大三昧忿怒金剛三摩地從定出已以金剛三業宣説一切如來作金剛怖忿怒大明曰唵引一句紇哩二合引二瑟致哩三合引三尾訖哩二合多引那那四薩哩嚩二合設咄嚕二合那引舍野五薩擔二合婆野六吽引吽引發吒上同發吒上同莎引賀引七當以此大明作忿怒調伏法行人當取嚕地囉等置三角護摩爐其爐分量大小如諸儀軌復入羅嚩拏囉𡁠迦等物燃以建吒迦而作護摩作護摩時稱所調伏乾𭔞名字以前大明作護摩八千遍日三時作或中夜作而彼乾𭔞速令句召一切調伏既調伏已於三劫中常持佛法及金剛手法住佛三昧遠離愚癡增長壽命諸有作法者當於白月八日或十四日往詣空舍或尸陀林中用朅致迦書彼設咄嚕名字依本儀軌用本部大明加持或用母訥誐囉作調伏法行人口誦吽字即時出現熾盛大光猛焰可怖所有一切設咄嚕衆及餘惡者皆大驚怖而悉調伏思念金剛手菩薩諸佛金剛最上三寶一切衆生是所歸趣違佛法者決定破壞所有金剛羯磨部幟盛光明曼拏羅中本尊影像大明印相等依法所作能令一切設咄嚕衆及諸惡者隨順調伏一切令住佛菩薩想若有違背佛正法者決定破壞諸佛菩薩以善方便調伏一切怨惡衆生令住三昧宣説一切祕密大明心法破壞諸惡令諸衆生與智相應常住最上佛菩提想若有行人以清淨心想於四處置踰室多一切莊嚴諸分圓滿如彼蓮華現開敷相復想吽字大明現五種光成金剛相應自身語心業得金剛堅固即得成就無上菩提於剎那間與毗盧遮那光明同等安住金剛薩埵大祕密主三金剛部此名金剛薩埵出生金剛三摩地諸有修習踰室多法得成就者發猛利心當取束訖囉依法而食彼於剎那間即與妙吉祥光明同等隱身自在吉祥勝妙身有光明如紫金色若有行人發猛利心取尾瑟吒及摩賀滿蹉依法而食即得成就大明勝行諸佛不能見又復行人發猛利心當取説那訶耶摩賀三種滿蹉同處和合依法而食即得成就勝行諸佛不能見若用尾瑟吒及三種鐵合成虞尼迦於二處相應者於一切處諸佛不能見又復行人發猛利心取瞿滿蹉及三種鐵合成虞尼迦於二處相應者即諸佛不能見又復行人發猛利心取鉢囉拏作虞尼迦於二處相應者即諸佛不能見又復行人若取龍腦香及旃檀香以三種鐵作虞尼迦於二處相應者即諸佛不能見又復行人若取牛黃及沈水香與三種鐵作虞尼迦於二處相應者即諸佛不能見又復行人若取恭俱摩香與三種鐵作虞尼迦於二處相應者即諸佛不能見如是了知一切平等即得成就相應自在得大印加持最勝吉祥有大威力隱顯自在與諸佛光明同等於三千大千界中最勝自在乃至俱胝由旬剎中皆得金剛自在欲色界中隨欲所往一切無礙是名諸佛大力三昧安怛陀那大金剛法是時世尊説是法已發歡喜心作熙怡眼觀察衆會出微妙聲作如是言大哉真實此正念大哉祕密文字句大哉自性本清淨大哉諸法妙無垢
